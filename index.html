    <!-- InitiateCheckout Event on CTA clicks -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.addEventListener('click', function(e) {
        var target = e.target.closest('a, button');
        if (!target) return;
        
        var href = (target.getAttribute('href') || '').toLowerCase();
        var text = (target.textContent || '').toLowerCase();
        
        // Fire InitiateCheckout for ALL checkout/CTA buttons
        var isCheckoutLink = href.includes('stripe') || href.includes('checkout') || 
                            href.includes('buy') || href.includes('pay') || href.includes('subscribe');
        var isCtaText = text.includes('empieza') || text.includes('empezar') || 
                       text.includes('crea perfil') || text.includes('quema grasa') ||
                       text.includes('ahora') || text.includes('comenzar') ||
                       text.includes('$') || text.includes('€') || text.includes('/mes');
        var isCtaStyle = target.classList.contains('cta') || target.closest('.cta') ||
                        target.closest('[class*="button"]') || target.closest('[class*="btn"]');
        
        if (isCheckoutLink || isCtaText || isCtaStyle) {
          if (typeof fbq !== 'undefined') {
            fbq('track', 'InitiateCheckout');
          }
          // Delay navigation slightly to ensure pixel fires
          if (target.tagName === 'A' && target.href) {
            e.preventDefault();
            setTimeout(function() {
              window.location.href = target.href;
            }, 300);
          }
        }
      });
    });
    </script>
